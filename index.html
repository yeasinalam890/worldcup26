<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026 Predictor</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #1d4ed8;
            --bg-main: #0b0f19;
            --bg-card: #151f32;
            --bg-input: #222f47;
            --text-light: #f8fafc;
            --text-muted: #64748b;
            --border: #2e3f5b;
            --accent: #10b981;
            --gold: #f59e0b;
            --bronze: #cd7f32;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-light);
            padding: 30px 20px;
            line-height: 1.5;
            position: relative;
            overflow-x: hidden;
        }

        #celeb-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
            background: linear-gradient(145deg, #1e3a8a, #0b0f19);
            padding: 35px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 8px;
            letter-spacing: 1px;
            background: linear-gradient(to right, #60a5fa, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .stats-dashboard {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 25px;
            margin-bottom: 40px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        .stats-dashboard h2 {
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: var(--gold);
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .stats-card {
            background-color: var(--bg-main);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 10px;
        }

        .stats-card label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .stats-input {
            width: 100%;
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            color: white;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.95rem;
        }

        .stats-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 35px;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.2);
        }

        button:hover {
            background-color: var(--primary-dark);
            transform: translateY(-1px);
        }

        button.secondary {
            background-color: transparent;
            border: 2px solid var(--border);
            color: var(--text-light);
            box-shadow: none;
        }

        button.secondary:hover {
            background-color: var(--bg-input);
        }

        .tabs {
            display: flex;
            justify-content: center;
            border-bottom: 2px solid var(--border);
            margin-bottom: 35px;
        }

        .tab {
            padding: 14px 35px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            font-size: 1.05rem;
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .view-panel {
            display: none;
        }

        .view-panel.active {
            display: block;
        }

        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        .group-card {
            background-color: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 22px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .group-card h3 {
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 18px;
            color: #93c5fd;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
        }

        .standings-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 22px;
            font-size: 0.9rem;
        }

        .standings-table th, .standings-table td {
            padding: 10px 8px;
            text-align: center;
        }

        .standings-table th {
            color: var(--text-muted);
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        .standings-table td.team-name {
            text-align: left;
            font-weight: 600;
            width: 50%;
        }

        .standings-table tr:nth-child(1) td, .standings-table tr:nth-child(2) td {
            color: #60a5fa;
        }

        .fixtures-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .match-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--bg-main);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .match-team {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .match-team.home { text-align: right; margin-right: 12px; }
        .match-team.away { text-align: left; margin-left: 12px; }

        .score-inputs {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .score-input {
            width: 38px;
            height: 32px;
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            color: white;
            text-align: center;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
        }

        .score-input.pk-input {
            border-color: var(--gold);
            color: var(--gold);
            width: 34px;
            height: 28px;
            font-size: 0.85rem;
        }

        .score-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 5px rgba(59, 130, 246, 0.5);
        }

        .bracket-container {
            display: flex;
            gap: 35px;
            overflow-x: auto;
            padding: 20px 0;
            align-items: center;
        }

        .bracket-round {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            min-width: 280px;
            height: 1400px;
            gap: 10px;
        }

        .bracket-round-title {
            text-align: center;
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 5px;
        }

        .bracket-matchups-wrapper {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            flex-grow: 1;
        }

        .bracket-matchup {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            width: 100%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: border-color 0.3s;
        }

        .bracket-matchup.final-match {
            border: 2px solid var(--gold);
            position: relative;
        }

        .bracket-matchup.final-match::before {
            content: "🏆 GRAND FINAL";
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold);
            color: var(--bg-main);
            font-size: 0.7rem;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 10px;
            white-space: nowrap;
        }

        .bracket-matchup.third-place-match {
            border: 2px solid var(--bronze);
            position: relative;
            margin-top: 40px;
        }

        .bracket-matchup.third-place-match::before {
            content: "🥉 3RD PLACE MATCH";
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bronze);
            color: white;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 10px;
            white-space: nowrap;
        }

        .bracket-team-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 8px;
            font-size: 0.88rem;
            border-radius: 6px;
            margin: 4px 0;
            align-items: center;
        }

        .bracket-team-name {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 130px;
        }

        .bracket-team-row.winner {
            background-color: rgba(16, 185, 129, 0.15);
            color: #10b981;
            font-weight: 700;
        }

        .pk-wrap {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .pk-badge {
            font-size: 0.65rem;
            color: var(--gold);
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<canvas id="celeb-canvas"></canvas>

<header>
    <h1>🏆 FIFA WORLD CUP Yeasin 2026</h1>
    <p>Simulate matches, auto-rank wildcards, map the tree, and manage live custom tournament awards</p>
</header>

<div class="stats-dashboard">
    <h2>🏅 TOURNAMENT AWARDS & STATS</h2>
    <div class="stats-grid">
        <div class="stats-card">
            <label>⚽ Top Scorer (Golden Boot)</label>
            <input type="text" class="stats-input" id="award-boot" placeholder="e.g. Kylian Mbappé">
        </div>
        <div class="stats-card">
            <label>🎯 Most Assists</label>
            <input type="text" class="stats-input" placeholder="e.g. Lionel Messi">
        </div>
        <div class="stats-card">
            <label>⭐ Best Player (Golden Ball)</label>
            <input type="text" class="stats-input" placeholder="e.g. Vinícius Júnior">
        </div>
        <div class="stats-card">
            <label>🛡️ Best Team</label>
            <input type="text" class="stats-input" id="award-team" placeholder="e.g. Spain 🇪🇸">
        </div>
    </div>
</div>

<div class="controls">
    <button onclick="simulateGroupStage()">Simulate Group Stage</button>
    <button class="secondary" onclick="resetTournament()">Reset Tournament</button>
</div>

<div class="tabs">
    <div class="tab active" id="tab-groups" onclick="switchTab('groups')">Group Stages</div>
    <div class="tab" id="tab-bracket" onclick="switchTab('bracket')">Knockout Bracket Tree</div>
</div>

<div id="panel-groups" class="view-panel active">
    <div id="wildcard-summary-zone"></div>
    <div class="groups-grid" id="groups-container"></div>
</div>

<div id="panel-bracket" class="view-panel">
    <div class="bracket-container" id="bracket-container"></div>
</div>

<script>
    const INITIAL_GROUPS = {
        A: { name: "Group A", teams: ["Mexico 🇲🇽", "South Korea 🇰🇷", "South Africa 🇿🇦", "Czechia 🇨🇿"], ratings: [84, 80, 74, 78] },
        B: { name: "Group B", teams: ["Canada 🇨🇦", "Bosnia & Herzegovina 🇧🇦", "Qatar 🇶🇦", "Switzerland 🇨🇭"], ratings: [79, 75, 72, 82] },
        C: { name: "Group C", teams: ["Brazil 🇧🇷", "Morocco 🇲🇦", "Haiti 🇭🇹", "Scotland 🏴󠁧󠁢󠁳󠁣󠁴󠁿"], ratings: [92, 85, 66, 77] },
        D: { name: "Group D", teams: ["United States 🇺🇸", "Paraguay 🇵🇾", "Australia 🇦🇺", "Türkiye 🇹🇷"], ratings: [83, 76, 78, 81] },
        E: { name: "Group E", teams: ["Germany 🇩🇪", "Ivory Coast 🇨🇮", "Ecuador 🇪🇨", "Curaçao 🇨🇼"], ratings: [89, 80, 81, 69] },
        F: { name: "Group F", teams: ["Netherlands 🇳🇱", "Japan 🇯🇵", "Sweden 🇸🇪", "Tunisia 🇹🇳"], ratings: [88, 83, 80, 75] },
        G: { name: "Group G", teams: ["Belgium 🇧🇪", "Egypt 🇪🇬", "Iran 🇮🇷", "New Zealand 🇳🇿"], ratings: [87, 79, 77, 68] },
        H: { name: "Group H", teams: ["Spain 🇪🇸", "Uruguay 🇺🇾", "Saudi Arabia 🇸🇦", "Cabo Verde 🇨🇻"], ratings: [93, 85, 74, 73] },
        I: { name: "Group I", teams: ["France 🇫🇷", "Senegal 🇸🇳", "Norway 🇳🇴", "Iraq 🇮🇶"], ratings: [94, 81, 80, 71] },
        J: { name: "Group J", teams: ["Argentina 🇦🇷", "Algeria 🇩🇿", "Austria 🇦🇹", "Jordan 🇯🇴"], ratings: [95, 78, 80, 70] },
        K: { name: "Group K", teams: ["Portugal 🇵🇹", "Colombia 🇨🇴", "Uzbekistan 🇺🇿", "DR Congo 🇨🇩"], ratings: [90, 84, 73, 74] },
        L: { name: "Group L", teams: ["England 🏴󠁧󠁢󠁥󠁮󠁧󠁿", "Croatia 🇭🇷", "Ghana 🇬🇭", "Panama 🇵🇦"], ratings: [93, 86, 76, 72] }
    };

    let tournamentState = {};
    let celebrationActive = false;
    let particles = [];

    function initTournament() {
        tournamentState = {
            groups: {},
            knockouts: {
                r32: Array(16).fill(null).map(() => [{name: "🏳️ TBD", score: "", pkScore: ""}, {name: "🏳️ TBD", score: "", pkScore: ""}]),
                r16: Array(8).fill(null).map(() => [{name: "🏳️ TBD", score: "", pkScore: ""}, {name: "🏳️ TBD", score: "", pkScore: ""}]),
                qf: Array(4).fill(null).map(() => [{name: "🏳️ TBD", score: "", pkScore: ""}, {name: "🏳️ TBD", score: "", pkScore: ""}]),
                sf: Array(2).fill(null).map(() => [{name: "🏳️ TBD", score: "", pkScore: ""}, {name: "🏳️ TBD", score: "", pkScore: ""}]),
                thirdPlace: [[{name: "🏳️ TBD", score: "", pkScore: ""}, {name: "🏳️ TBD", score: "", pkScore: ""}]],
                final: [[{name: "🏳️ TBD", score: "", pkScore: ""}, {name: "🏳️ TBD", score: "", pkScore: ""}]],
                champion: null
            }
        };

        for (const [key, info] of Object.entries(INITIAL_GROUPS)) {
            tournamentState.groups[key] = {
                id: key,
                name: info.name,
                teams: info.teams.map((t, idx) => ({ name: t, rating: info.ratings[idx], pld: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, pts: 0 })),
                fixtures: []
            };
            
            const t = tournamentState.groups[key].teams;
            const pairings = [[0,1], [2,3], [0,2], [1,3], [3,0], [1,2]];
            pairings.forEach(p => {
                tournamentState.groups[key].fixtures.push({ home: t[p[0]].name, away: t[p[1]].name, homeScore: '', awayScore: '' });
            });
        }
        renderGroupStage();
        renderBracket();
        setupInputNavigation();
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.view-panel').forEach(el => el.classList.remove('active'));
        document.getElementById(`tab-${tab}`).classList.add('active');
        document.getElementById(`panel-${tab}`).classList.add('active');
    }

    function setupInputNavigation() {
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.target.classList.contains('score-input')) {
                e.preventDefault();
                const inputs = Array.from(document.querySelectorAll('.score-input'));
                const currentIndex = inputs.indexOf(e.target);
                if (currentIndex > -1 && currentIndex < inputs.length - 1) {
                    inputs[currentIndex + 1].focus();
                    inputs[currentIndex + 1].select();
                }
            }
        });
    }

    function renderGroupStage() {
        const container = document.getElementById('groups-container');
        container.innerHTML = '';
        
        for (const [key, group] of Object.entries(tournamentState.groups)) {
            const card = document.createElement('div');
            card.className = 'group-card';
            card.setAttribute('data-group-id', key);
            
            let tableRows = group.teams.map(t => `
                <tr>
                    <td class="team-name">${t.name}</td>
                    <td>${t.pld}</td>
                    <td>${t.gd}</td>
                    <td><strong>${t.pts}</strong></td>
                </tr>
            `).join('');

            let fixtureRows = group.fixtures.map((f, idx) => `
                <div class="match-row">
                    <span class="match-team home">${f.home}</span>
                    <div class="score-inputs">
                        <input type="text" class="score-input" value="${f.homeScore}" oninput="updateManualScore('${key}', ${idx}, 'homeScore', this.value)">
                        <span>-</span>
                        <input type="text" class="score-input" value="${f.awayScore}" oninput="updateManualScore('${key}', ${idx}, 'awayScore', this.value)">
                    </div>
                    <span class="match-team away">${f.away}</span>
                </div>
            `).join('');

            card.innerHTML = `
                <h3>${group.name}</h3>
                <table class="standings-table">
                    <thead>
                        <tr>
                            <th style="text-align:left;">Team</th>
                            <th>P</th>
                            <th>GD</th>
                            <th>Pts</th>
                        </tr>
                    </thead>
                    <tbody>${tableRows}</tbody>
                </table>
                <div class="fixtures-list">${fixtureRows}</div>
            `;
            container.appendChild(card);
        }
    }

    function updateManualScore(groupKey, fixtureIdx, side, value) {
        const fixture = tournamentState.groups[groupKey].fixtures[fixtureIdx];
        fixture[side] = value === '' ? '' : parseInt(value);
        calculateStandings(groupKey);
        evaluateTournamentProgression();
        
        const groupCard = document.querySelector(`[data-group-id="${groupKey}"]`);
        if(groupCard) {
            const tableBody = groupCard.querySelector('.standings-table tbody');
            tableBody.innerHTML = tournamentState.groups[groupKey].teams.map((t) => `
                <tr>
                    <td class="team-name">${t.name}</td>
                    <td>${t.pld}</td>
                    <td>${t.gd}</td>
                    <td><strong>${t.pts}</strong></td>
                </tr>
            `).join('');
        }
        renderBracket();
    }

    function calculateStandings(groupId) {
        const group = tournamentState.groups[groupId];
        group.teams.forEach(t => { t.pld = 0; t.w = 0; t.d = 0; t.l = 0; t.gf = 0; t.ga = 0; t.gd = 0; t.pts = 0; });

        group.fixtures.forEach(f => {
            if (f.homeScore !== '' && f.awayScore !== '') {
                const hScore = parseInt(f.homeScore);
                const aScore = parseInt(f.awayScore);
                const homeTeam = group.teams.find(t => t.name === f.home);
                const awayTeam = group.teams.find(t => t.name === f.away);

                homeTeam.pld++; awayTeam.pld++;
                homeTeam.gf += hScore; awayTeam.gf += aScore;
                homeTeam.ga += aScore; awayTeam.ga += hScore;

                if (hScore > aScore) { homeTeam.w++; homeTeam.pts += 3; awayTeam.l++; }
                else if (hScore < aScore) { awayTeam.w++; awayTeam.pts += 3; homeTeam.l++; }
                else { homeTeam.d++; awayTeam.d++; homeTeam.pts += 1; awayTeam.pts += 1; }
            }
        });

        group.teams.forEach(t => { t.gd = t.gf - t.ga; });
        group.teams.sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
    }

    function simulateGroupStage() {
        for (const [key, group] of Object.entries(tournamentState.groups)) {
            group.fixtures.forEach(f => {
                const homeRating = group.teams.find(t => t.name === f.home).rating;
                const awayRating = group.teams.find(t => t.name === f.away).rating;
                
                const lambdaHome = Math.max(0.5, 1.4 + (homeRating - awayRating) / 10);
                const lambdaAway = Math.max(0.5, 1.4 + (awayRating - homeRating) / 10);

                f.homeScore = poissonRandom(lambdaHome);
                f.awayScore = poissonRandom(lambdaAway);
            });
            calculateStandings(key);
        }
        evaluateTournamentProgression();
        renderGroupStage();
        renderBracket();
    }

    function poissonRandom(lambda) {
        let L = Math.exp(-lambda), k = 0, p = 1;
        do { k++; p *= Math.random(); } while (p > L);
        return k - 1;
    }

    function evaluateTournamentProgression() {
        let qualifiers = []; 
        let thirdPlacePool = [];

        for (const [key, group] of Object.entries(tournamentState.groups)) {
            qualifiers.push({ seed: `1${key}`, name: group.teams[0].pld > 0 ? group.teams[0].name : `🏳️ 1${key}` });
            qualifiers.push({ seed: `2${key}`, name: group.teams[1].pld > 0 ? group.teams[1].name : `🏳️ 2${key}` });
            thirdPlacePool.push({ group: key, ...group.teams[2] });
        }

        thirdPlacePool.sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
        let activeWildcards = thirdPlacePool.slice(0, 8).map(t => t.pld > 0 ? t.name : "🏳️ TBD");

        const r32PairingTemplate = [
            { t1: "1A", t2: "3EFGH" }, { t1: "1B", t2: "3IJKL" }, { t1: "1C", t2: "2F" }, { t1: "2A", t2: "2B" },
            { t1: "1D", t2: "3BEFI" }, { t1: "1E", t2: "3ABCD" }, { t1: "1F", t2: "2C" }, { t1: "2D", t2: "2G" },
            { t1: "1G", t2: "3ABCJ" }, { t1: "1H", t2: "3EFGK" }, { t1: "1I", t2: "2E" }, { t1: "2I" , t2: "2H" },
            { t1: "1J", t2: "3FGHI" }, { t1: "1K", t2: "3IJKL" }, { t1: "1L", t2: "2L" }, { t1: "2J", t2: "2K" }
        ];

        let wildcardIdx = 0;
        r32PairingTemplate.forEach((match, idx) => {
            let homeTeam = qualifiers.find(q => q.seed === match.t1)?.name || "🏳️ TBD";
            let awayTeam = "🏳️ TBD";

            if (match.t2.startsWith("2")) {
                awayTeam = qualifiers.find(q => q.seed === match.t2)?.name || "🏳️ TBD";
            } else {
                awayTeam = activeWildcards[wildcardIdx] || "🏳️ TBD";
                wildcardIdx++;
            }

            if(tournamentState.knockouts.r32[idx][0].name !== homeTeam) tournamentState.knockouts.r32[idx][0].name = homeTeam;
            if(tournamentState.knockouts.r32[idx][1].name !== awayTeam) tournamentState.knockouts.r32[idx][1].name = awayTeam;
        });

        propagateNextRound('r32', 'r16');
        propagateNextRound('r16', 'qf');
        propagateNextRound('qf', 'sf');
        propagateFinalsAndThirdPlace();
    }

    function propagateNextRound(currentRoundKey, nextRoundKey) {
        const matches = tournamentState.knockouts[currentRoundKey];
        const nextMatches = tournamentState.knockouts[nextRoundKey];

        for (let i = 0; i < matches.length; i += 2) {
            const match1 = matches[i];
            const match2 = matches[i+1];
            const nextMatchIdx = i / 2;

            const winner1 = getMatchWinner(match1);
            const winner2 = getMatchWinner(match2);

            if(nextMatches[nextMatchIdx][0].name !== winner1) {
                nextMatches[nextMatchIdx][0].name = winner1;
                nextMatches[nextMatchIdx][0].score = "";
                nextMatches[nextMatchIdx][0].pkScore = "";
            }
            if(nextMatches[nextMatchIdx][1].name !== winner2) {
                nextMatches[nextMatchIdx][1].name = winner2;
                nextMatches[nextMatchIdx][1].score = "";
                nextMatches[nextMatchIdx][1].pkScore = "";
            }
        }
    }

    function propagateFinalsAndThirdPlace() {
        const sfMatches = tournamentState.knockouts.sf;
        const finalMatch = tournamentState.knockouts.final[0];
        const thirdPlaceMatch = tournamentState.knockouts.thirdPlace[0];

        const winner1 = getMatchWinner(sfMatches[0]);
        const winner2 = getMatchWinner(sfMatches[1]);
        const loser1 = getMatchLoser(sfMatches[0]);
        const loser2 = getMatchLoser(sfMatches[1]);

        if(finalMatch[0].name !== winner1) { finalMatch[0].name = winner1; finalMatch[0].score = ""; finalMatch[0].pkScore = ""; }
        if(finalMatch[1].name !== winner2) { finalMatch[1].name = winner2; finalMatch[1].score = ""; finalMatch[1].pkScore = ""; }

        if(thirdPlaceMatch[0].name !== loser1) { thirdPlaceMatch[0].name = loser1; thirdPlaceMatch[0].score = ""; thirdPlaceMatch[0].pkScore = ""; }
        if(thirdPlaceMatch[1].name !== loser2) { thirdPlaceMatch[1].name = loser2; thirdPlaceMatch[1].score = ""; thirdPlaceMatch[1].pkScore = ""; }

        const champion = getMatchWinner(finalMatch);
        if (champion && champion !== "🏳️ TBD" && champion !== tournamentState.knockouts.champion) {
            tournamentState.knockouts.champion = champion;
            document.getElementById('award-team').value = champion;
            triggerCelebration();
        } else if (!champion || champion === "🏳️ TBD") {
            tournamentState.knockouts.champion = null;
        }
    }

    function getMatchWinner(match) {
        if (match[0].score === "" || match[1].score === "" || match[0].score === null || match[1].score === null) return "🏳️ TBD";
        const s1 = parseInt(match[0].score);
        const s2 = parseInt(match[1].score);
        
        if (s1 === s2) {
            const pk1 = parseInt(match[0].pkScore);
            const pk2 = parseInt(match[1].pkScore);
            if (isNaN(pk1) || isNaN(pk2)) return "🏳️ TBD";
            return pk1 > pk2 ? match[0].name : match[1].name;
        }
        return s1 > s2 ? match[0].name : match[1].name;
    }

    function getMatchLoser(match) {
        if (match[0].score === "" || match[1].score === "" || match[0].score === null || match[1].score === null) return "🏳️ TBD";
        const s1 = parseInt(match[0].score);
        const s2 = parseInt(match[1].score);
        
        if (s1 === s2) {
            const winner = getMatchWinner(match);
            if (winner === "🏳️ TBD") return "🏳️ TBD";
            return winner === match[0].name ? match[1].name : match[0].name;
        }
        return s1 > s2 ? match[1].name : match[0].name;
    }

    function updateKnockoutScore(roundKey, matchIdx, teamIdx, val) {
        let match = tournamentState.knockouts[roundKey] ? tournamentState.knockouts[roundKey][matchIdx] : tournamentState.knockouts.thirdPlace[matchIdx];
        match[teamIdx].score = val === "" ? "" : parseInt(val);
        
        runPropagationChain(roundKey);
        renderBracket();
    }

    function updatePenaltyScore(roundKey, matchIdx, teamIdx, val) {
        let match = tournamentState.knockouts[roundKey] ? tournamentState.knockouts[roundKey][matchIdx] : tournamentState.knockouts.thirdPlace[matchIdx];
        match[teamIdx].pkScore = val === "" ? "" : parseInt(val);
        
        runPropagationChain(roundKey);
        renderBracket();
    }

    function runPropagationChain(roundKey) {
        if (roundKey === 'r32') { propagateNextRound('r32', 'r16'); propagateNextRound('r16', 'qf'); propagateNextRound('qf', 'sf'); propagateFinalsAndThirdPlace(); }
        else if (roundKey === 'r16') { propagateNextRound('r16', 'qf'); propagateNextRound('qf', 'sf'); propagateFinalsAndThirdPlace(); }
        else if (roundKey === 'qf') { propagateNextRound('qf', 'sf'); propagateFinalsAndThirdPlace(); }
        else if (roundKey === 'sf' || roundKey === 'final' || roundKey === 'thirdPlace') { propagateFinalsAndThirdPlace(); }
    }

    function renderBracket() {
        const container = document.getElementById('bracket-container');
        container.innerHTML = '';

        const rounds = [
            { id: 'r32', name: 'Round of 32' },
            { id: 'r16', name: 'Round of 16' },
            { id: 'qf', name: 'Quarter Finals' },
            { id: 'sf', name: 'Semi Finals & 3rd Pl.' },
            { id: 'final', name: 'Grand Final' }
        ];

        rounds.forEach(round => {
            const roundDiv = document.createElement('div');
            roundDiv.className = 'bracket-round';
            
            const title = document.createElement('div');
            title.className = 'bracket-round-title';
            title.innerText = round.name;
            roundDiv.appendChild(title);

            const wrapper = document.createElement('div');
            wrapper.className = 'bracket-matchups-wrapper';

            const matches = tournamentState.knockouts[round.id];
            
            if (matches) {
                matches.forEach((match, idx) => {
                    const winTeam = getMatchWinner(match);
                    const isDraw = match[0].score !== "" && match[1].score !== "" && match[0].score !== null && match[0].score === match[1].score;
                    const matchCard = document.createElement('div');
                    matchCard.className = 'bracket-matchup';
                    if (round.id === 'final') matchCard.className += ' final-match';

                    matchCard.innerHTML = `
                        <div class="bracket-team-row ${winTeam === match[0].name && winTeam !== '🏳️ TBD' ? 'winner' : ''}">
                            <span class="bracket-team-name">${match[0].name}</span>
                            <div class="pk-wrap">
                                ${isDraw ? `<span class="pk-badge">PK:</span><input type="text" class="score-input pk-input" value="${match[0].pkScore !== null ? match[0].pkScore : ''}" oninput="updatePenaltyScore('${round.id}', ${idx}, 0, this.value)">` : ''}
                                <input type="text" class="score-input" value="${match[0].score !== null ? match[0].score : ''}" oninput="updateKnockoutScore('${round.id}', ${idx}, 0, this.value)">
                            </div>
                        </div>
                        <div class="bracket-team-row ${winTeam === match[1].name && winTeam !== '🏳️ TBD' ? 'winner' : ''}">
                            <span class="bracket-team-name">${match[1].name}</span>
                            <div class="pk-wrap">
                                ${isDraw ? `<span class="pk-badge">PK:</span><input type="text" class="score-input pk-input" value="${match[1].pkScore !== null ? match[1].pkScore : ''}" oninput="updatePenaltyScore('${round.id}', ${idx}, 1, this.value)">` : ''}
                                <input type="text" class="score-input" value="${match[1].score !== null ? match[1].score : ''}" oninput="updateKnockoutScore('${round.id}', ${idx}, 1, this.value)">
                            </div>
                        </div>
                    `;
                    wrapper.appendChild(matchCard);
                });
            }

            if (round.id === 'sf') {
                const thirdMatch = tournamentState.knockouts.thirdPlace[0];
                const thirdWin = getMatchWinner(thirdMatch);
                const thirdDraw = thirdMatch[0].score !== "" && thirdMatch[1].score !== "" && thirdMatch[0].score !== null && thirdMatch[0].score === thirdMatch[1].score;
                const thirdCard = document.createElement('div');
                thirdCard.className = 'bracket-matchup third-place-match';
                thirdCard.innerHTML = `
                    <div class="bracket-team-row ${thirdWin === thirdMatch[0].name && thirdWin !== '🏳️ TBD' ? 'winner' : ''}">
                        <span class="bracket-team-name">${thirdMatch[0].name}</span>
                        <div class="pk-wrap">
                            ${thirdDraw ? `<span class="pk-badge">PK:</span><input type="text" class="score-input pk-input" value="${thirdMatch[0].pkScore !== null ? thirdMatch[0].pkScore : ''}" oninput="updatePenaltyScore('thirdPlace', 0, 0, this.value)">` : ''}
                            <input type="text" class="score-input" value="${thirdMatch[0].score !== null ? thirdMatch[0].score : ''}" oninput="updateKnockoutScore('thirdPlace', 0, 0, this.value)">
                        </div>
                    </div>
                    <div class="bracket-team-row ${thirdWin === thirdMatch[1].name && thirdWin !== '🏳️ TBD' ? 'winner' : ''}">
                        <span class="bracket-team-name">${thirdMatch[1].name}</span>
                        <div class="pk-wrap">
                            ${thirdDraw ? `<span class="pk-badge">PK:</span><input type="text" class="score-input pk-input" value="${thirdMatch[1].pkScore !== null ? thirdMatch[1].pkScore : ''}" oninput="updatePenaltyScore('thirdPlace', 0, 1, this.value)">` : ''}
                            <input type="text" class="score-input" value="${thirdMatch[1].score !== null ? thirdMatch[1].score : ''}" oninput="updateKnockoutScore('thirdPlace', 0, 1, this.value)">
                        </div>
                    </div>
                `;
                wrapper.appendChild(thirdCard);
            }

            roundDiv.appendChild(wrapper);
            container.appendChild(roundDiv);
        });
    }

    function triggerCelebration() {
        if (celebrationActive) return;
        celebrationActive = true;
        const canvas = document.getElementById('celeb-canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        particles = [];
        for (let i = 0; i < 150; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                r: Math.random() * 6 + 4,
                d: Math.random() * canvas.height,
                color: `hsl(${Math.random() * 360}, 90%, 60%)`,
                tilt: Math.random() * 10 - 5,
                tiltAngleIncremental: Math.random() * 0.07 + 0.02,
                tiltAngle: 0
            });
        }

        let animationFrameId;
        let startTime = Date.now();

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let remaining = false;

            particles.forEach((p) => {
                p.tiltAngle += p.tiltAngleIncremental;
                p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2;
                p.x += Math.sin(p.tiltAngle);
                p.tilt = Math.sin(p.tiltAngle - p.r / 2) * 5;

                if (p.y < canvas.height) remaining = true;

                ctx.beginPath();
                ctx.lineWidth = p.r;
                ctx.strokeStyle = p.color;
                ctx.moveTo(p.x + p.tilt + p.r / 2, p.y);
                ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
                ctx.stroke();
            });

            if (remaining && Date.now() - startTime < 6000) {
                animationFrameId = requestAnimationFrame(draw);
            } else {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                celebrationActive = false;
            }
        }
        draw();
    }

    function resetTournament() {
        initTournament();
        document.getElementById('award-boot').value = '';
        document.getElementById('award-team').value = '';
        const canvas = document.getElementById('celeb-canvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        celebrationActive = false;
    }

    window.addEventListener('resize', () => {
        const canvas = document.getElementById('celeb-canvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    initTournament();
</script>

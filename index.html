<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026 Predictor & Dream XI</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #1d4ed8;
            --bg-main: #0b0f19;
            --bg-card: #151f32;
            --bg-input: #222f47;
            --text-light: #f8fafc;
            --text-muted: #64748b;
            --border: #2e3f5b;
            --accent: #10b981;
            --gold: #f59e0b;
            --bronze: #cd7f32;
            --pitch-green: #115e59;
            --pitch-lines: rgba(255, 255, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-light);
            padding: 30px 20px;
            line-height: 1.5;
            position: relative;
            overflow-x: hidden;
        }

        #celeb-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
            background: linear-gradient(145deg, #1e3a8a, #0b0f19);
            padding: 35px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 8px;
            letter-spacing: 1px;
            background: linear-gradient(to right, #60a5fa, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .stats-dashboard {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 25px;
            margin-bottom: 40px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        .stats-dashboard h2 {
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: var(--gold);
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .stats-card {
            background-color: var(--bg-main);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 10px;
        }

        .stats-card label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .stats-input {
            width: 100%;
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            color: white;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.95rem;
        }

        .stats-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.2);
        }

        button:hover {
            background-color: var(--primary-dark);
            transform: translateY(-1px);
        }

        button.secondary {
            background-color: transparent;
            border: 2px solid var(--border);
            color: var(--text-light);
            box-shadow: none;
        }

        button.secondary:hover {
            background-color: var(--bg-input);
        }

        button.dream-btn {
            background: linear-gradient(135deg, #f59e0b, #ea580c);
            box-shadow: 0 4px 6px rgba(234, 88, 12, 0.2);
        }
        button.dream-btn:hover {
            background: linear-gradient(135deg, #d97706, #c2410c);
        }

        .tabs {
            display: flex;
            justify-content: center;
            border-bottom: 2px solid var(--border);
            margin-bottom: 35px;
        }

        .tab {
            padding: 14px 35px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            font-size: 1.05rem;
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .view-panel {
            display: none;
        }

        .view-panel.active {
            display: block;
        }

        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        .group-card {
            background-color: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 22px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .group-card h3 {
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 18px;
            color: #93c5fd;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
        }

        .standings-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 22px;
            font-size: 0.9rem;
        }

        .standings-table th, .standings-table td {
            padding: 10px 8px;
            text-align: center;
        }

        .standings-table th {
            color: var(--text-muted);
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        .standings-table td.team-name {
            text-align: left;
            font-weight: 600;
            width: 50%;
        }

        .standings-table tr:nth-child(1) td, .standings-table tr:nth-child(2) td {
            color: #60a5fa;
        }

        .fixtures-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .match-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--bg-main);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .match-team {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .match-team.home { text-align: right; margin-right: 12px; }
        .match-team.away { text-align: left; margin-left: 12px; }

        .score-inputs {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .score-input {
            width: 38px;
            height: 32px;
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            color: white;
            text-align: center;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
        }

        .score-input.pk-input {
            border-color: var(--gold);
            color: var(--gold);
            width: 34px;
            height: 28px;
            font-size: 0.85rem;
        }

        .score-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 5px rgba(59, 130, 246, 0.5);
        }

        .bracket-container {
            display: flex;
            gap: 35px;
            overflow-x: auto;
            padding: 20px 0;
            align-items: center;
        }

        .bracket-round {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            min-width: 280px;
            height: 1400px;
            gap: 10px;
        }

        .bracket-round-title {
            text-align: center;
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 5px;
        }

        .bracket-matchups-wrapper {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            flex-grow: 1;
        }

        .bracket-matchup {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            width: 100%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: border-color 0.3s;
        }

        .bracket-matchup.final-match {
            border: 2px solid var(--gold);
            position: relative;
        }

        .bracket-matchup.final-match::before {
            content: "🏆 GRAND FINAL";
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold);
            color: var(--bg-main);
            font-size: 0.7rem;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 10px;
            white-space: nowrap;
        }

        .bracket-matchup.third-place-match {
            border: 2px solid var(--bronze);
            position: relative;
            margin-top: 40px;
        }

        .bracket-matchup.third-place-match::before {
            content: "🥉 3RD PLACE MATCH";
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bronze);
            color: white;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 10px;
            white-space: nowrap;
        }

        .bracket-team-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 8px;
            font-size: 0.88rem;
            border-radius: 6px;
            margin: 4px 0;
            align-items: center;
        }

        .bracket-team-name {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 130px;
        }

        .bracket-team-row.winner {
            background-color: rgba(16, 185, 129, 0.15);
            color: #10b981;
            font-weight: 700;
        }

        .pk-wrap {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .pk-badge {
            font-size: 0.65rem;
            color: var(--gold);
            font-weight: bold;
            text-transform: uppercase;
        }

        /* DREAM XI STYLING */
        .dream-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-main);
            z-index: 10000;
            display: none;
            padding: 20px;
            overflow-y: auto;
        }

        .dream-modal.active {
            display: block;
        }

        .dream-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .dream-layout {
            display: grid;
            grid-template-columns: 1fr 430px;
            gap: 30px;
            max-width: 1440px;
            margin: 0 auto;
        }

        @media(max-width: 950px) {
            .dream-layout {
                grid-template-columns: 1fr;
            }
        }

        .pitch-container {
            background-color: var(--pitch-green);
            border: 4px solid white;
            border-radius: 12px;
            height: 660px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px 0;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.6);
        }

        .pitch-container::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 140px;
            height: 140px;
            border: 2px solid var(--pitch-lines);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .pitch-container::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--pitch-lines);
            transform: translateY(-50%);
            pointer-events: none;
        }

        .pitch-line-row {
            display: flex;
            justify-content: space-around;
            width: 100%;
            z-index: 2;
        }

        .pitch-player-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            width: 100px;
        }

        .avatar-circle-icon {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.85rem;
            color: white;
            border: 2px solid white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            transition: transform 0.2s;
            background-color: var(--primary);
        }

        .pitch-player-card:hover .avatar-circle-icon {
            transform: scale(1.1);
            border-color: var(--gold);
        }

        .player-name-label {
            background-color: rgba(11, 15, 25, 0.9);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 3px 6px;
            font-size: 0.72rem;
            text-align: center;
            margin-top: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 105px;
            color: white;
            font-weight: 600;
        }

        .selection-sidebar {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: 660px;
        }

        .selection-sidebar h3 {
            color: var(--gold);
            font-size: 1.1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .team-selector-dropdown {
            width: 100%;
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            color: white;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
        }

        .player-pool-list {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 5px;
        }

        .pool-player-item {
            background-color: var(--bg-main);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            gap: 12px;
            align-items: center;
            transition: border-color 0.2s, background 0.2s;
        }

        .pool-player-item:hover {
            background-color: var(--bg-input);
            border-color: var(--primary);
        }

        .pool-player-avatar-view {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
            border: 1px solid var(--border);
        }

        .pool-player-details {
            flex-grow: 1;
        }

        .pool-info-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .pool-player-name {
            font-weight: bold;
            color: white;
            font-size: 0.92rem;
        }

        .club-tag {
            font-size: 0.75rem;
            color: var(--gold);
            font-weight: 500;
        }
    </style>
</head>
<body>

<canvas id="celeb-canvas"></canvas>

<header>
    <h1>🏆 FIFA WORLD CUP Yeasin 2026</h1>
    <p>Simulate matches, auto-rank wildcards, map the tree, and manage live custom tournament awards</p>
</header>

<div class="stats-dashboard">
    <h2>🏅 TOURNAMENT AWARDS & STATS</h2>
    <div class="stats-grid">
        <div class="stats-card">
            <label>⚽ Top Scorer (Golden Boot)</label>
            <input type="text" class="stats-input" id="award-boot" placeholder="e.g. Kylian Mbappé">
        </div>
        <div class="stats-card">
            <label>🎯 Most Assists</label>
            <input type="text" class="stats-input" placeholder="e.g. Lionel Messi">
        </div>
        <div class="stats-card">
            <label>⭐ Best Player (Golden Ball)</label>
            <input type="text" class="stats-input" placeholder="e.g. Vinícius Júnior">
        </div>
        <div class="stats-card">
            <label>🛡️ Best Team</label>
            <input type="text" class="stats-input" id="award-team" placeholder="e.g. Spain 🇪🇸">
        </div>
    </div>
</div>

<div class="controls">
    <button onclick="simulateGroupStage()">Simulate Group Stage</button>
    <button class="dream-btn" onclick="openDreamXI()">✨ Build Dream XI</button>
    <button class="secondary" onclick="resetTournament()">Reset Tournament</button>
</div>

<div class="tabs">
    <div class="tab active" id="tab-groups" onclick="switchTab('groups')">Group Stages</div>
    <div class="tab" id="tab-bracket" onclick="switchTab('bracket')">Knockout Bracket Tree</div>
</div>

<div id="panel-groups" class="view-panel active">
    <div id="wildcard-summary-zone"></div>
    <div class="groups-grid" id="groups-container"></div>
</div>

<div id="panel-bracket" class="view-panel">
    <div class="bracket-container" id="bracket-container"></div>
</div>

<div id="dream-xi-modal" class="dream-modal">
    <div class="dream-header">
        <h2>⚽ Dream XI Tournament Manager</h2>
        <div style="display:flex; gap: 12px; align-items:center;">
            <label style="font-weight:bold; font-size:0.9rem;">Formation:</label>
            <select class="team-selector-dropdown" style="width:100px; padding:6px;" id="formation-select" onchange="changeFormation()">
                <option value="433">4-3-3</option>
                <option value="442">4-4-2</option>
                <option value="352">3-5-2</option>
            </select>
            <button class="secondary" style="padding: 8px 16px;" onclick="closeDreamXI()">Back to Tournament</button>
        </div>
    </div>
    
    <div class="dream-layout">
        <div class="pitch-container" id="pitch-field">
            </div>
        
        <div class="selection-sidebar">
            <h3 id="sidebar-instruction">Select a position on the pitch</h3>
            <label style="font-size:0.8rem; color:var(--text-muted); font-weight:bold;">Filter By National Team:</label>
            <select class="team-selector-dropdown" id="sidebar-team-filter" onchange="loadPlayerPool()">
                <option value="ALL">Show All Players</option>
            </select>
            
            <div class="player-pool-list" id="player-pool-container">
                </div>
        </div>
    </div>
</div>

<script>
    const INITIAL_GROUPS = {

        G: { name: "Group G", teams: ["Belgium 🇧🇪", "Egypt 🇪🇬", "Iran 🇮🇷", "New Zealand 🇳🇿"], ratings: [87, 79, 77, 68] },

        I: { name: "Group I", teams: ["France 🇫🇷", "Senegal 🇸🇳", "Norway 🇳🇴", "Iraq 🇮🇶"], ratings: [94, 81, 80, 71] },
        J: { name: "Group J", teams: ["Argentina 🇦🇷", "Algeria 🇩🇿", "Austria 🇦🇹", "Jordan 🇯🇴"], ratings: [95, 78, 80, 70] },
        K: { name: "Group K", teams: ["Portugal 🇵🇹", "Colombia 🇨🇴", "Uzbekistan 🇺🇿", "DR Congo 🇨🇩"], ratings: [90, 84, 73, 74] },
        L: { name: "Group L", teams: ["England 🏴󠁧󠁢󠁥󠁮󠁧󠁿", "Croatia 🇭🇷", "Ghana 🇬🇭", "Panama 🇵🇦"], ratings: [93, 86, 76, 72] }
    };

    // 100% HARDCODED AUTHENTIC NATIONAL TOURNAMENT ROSTERS
    const MASTER_REAL_SQUADS = {
        "Germany 🇩🇪": [
            { name: "Marc-André ter Stegen", pos: "GK", height: "187 cm", weight: "85 kg", pref: "GK", club: "FC Barcelona", bg: "#1e3a8a", init: "TS" },

            { name: "Antonio Rüdiger", pos: "DF", height: "190 cm", weight: "85 kg", pref: "CB", club: "Real Madrid", bg: "#065f46", init: "AR" },
            { name: "Jonathan Tah", pos: "DF", height: "195 cm", weight: "94 kg", pref: "CB", club: "Bayer Leverkusen", bg: "#065f46", init: "JT" },
            { name: "Nico Schlotterbeck", pos: "DF", height: "191 cm", weight: "86 kg", pref: "CB", club: "Borussia Dortmund", bg: "#065f46", init: "NS" },

    function getProceduralSquadForNation(nationName) {
        if (MASTER_REAL_SQUADS[nationName]) {
            return MASTER_REAL_SQUADS[nationName];
        }

        let players = [];
        const baseName = nationName.split(' ')[0];
        const countPos = (p) => players.filter(pl => pl.pos === p).length;

        // GK
        while (countPos("GK") < 2) {
            let i = countPos("GK") + 1;
            let f = GENERIC_FIRST[(baseName.length + i) % GENERIC_FIRST.length];
            let l = GENERIC_LAST[(baseName.length * i) % GENERIC_LAST.length];
            let c = GENERIC_CLUBS[(baseName.length + i) % GENERIC_CLUBS.length];
            players.push({ name: `${f} ${l}`, pos: "GK", height: "188 cm", weight: "83 kg", pref: "GK", club: c, bg: "#1e3a8a", init: f[0]+l[0] });
        }
        // DF
        while (countPos("DF") < 4) {
            let i = countPos("DF") + 1;
            let f = GENERIC_FIRST[(baseName.charCodeAt(0) + i) % GENERIC_FIRST.length];
            let l = GENERIC_LAST[(baseName.length + i) % GENERIC_LAST.length];
            let c = GENERIC_CLUBS[(baseName.charCodeAt(0) * i) % GENERIC_CLUBS.length];
            players.push({ name: `${f} ${l}`, pos: "DF", height: "184 cm", weight: "77 kg", pref: "CB", club: c, bg: "#065f46", init: f[0]+l[0] });
        }
        // MF
        while (countPos("MF") < 4) {
            let i = countPos("MF") + 1;
            let f = GENERIC_FIRST[(baseName.length + i * 2) % GENERIC_FIRST.length];
            let l = GENERIC_LAST[(baseName.charCodeAt(0) + i) % GENERIC_LAST.length];
            let c = GENERIC_CLUBS[(baseName.length + i * 3) % GENERIC_CLUBS.length];
            players.push({ name: `${f} ${l}`, pos: "MF", height: "178 cm", weight: "72 kg", pref: "CM", club: c, bg: "#b45309", init: f[0]+l[0] });
        }
        // FW
        while (countPos("FW") < 3) {
            let i = countPos("FW") + 1;
            let f = GENERIC_FIRST[(baseName.charCodeAt(0) + i * 3) % GENERIC_FIRST.length];
            let l = GENERIC_LAST[(baseName.length + i * 2) % GENERIC_LAST.length];
            let c = GENERIC_CLUBS[(baseName.charCodeAt(0) + i) % GENERIC_CLUBS.length];
            players.push({ name: `${f} ${l}`, pos: "FW", height: "182 cm", weight: "76 kg", pref: "ST", club: c, bg: "#991b1b", init: f[0]+l[0] });
        }

        players.forEach(p => p.team = nationName);
        return players;
    }

    function initTournament() {
        tournamentState = {
            groups: {},
            knockouts: {
                r32: Array(16).fill(null).map(() => [{name: "🏳️ TBD", score: "", pkScore: ""}, {name: "🏳️ TBD", score: "", pkScore: ""}]),
                r16: Array(8).fill(null).map(() => [{name: "🏳️ TBD", score: "", pkScore: ""}, {name: "🏳️ TBD", score: "", pkScore: ""}]),
                qf: Array(4).fill(null).map(() => [{name: "🏳️ TBD", score: "", pkScore: ""}, {name: "🏳️ TBD", score: "", pkScore: ""}]),
                sf: Array(2).fill(null).map(() => [{name: "🏳️ TBD", score: "", pkScore: ""}, {name: "🏳️ TBD", score: "", pkScore: ""}]),
                thirdPlace: [[{name: "🏳️ TBD", score: "", pkScore: ""}, {name: "🏳️ TBD", score: "", pkScore: ""}]],
                final: [[{name: "🏳️ TBD", score: "", pkScore: ""}, {name: "🏳️ TBD", score: "", pkScore: ""}]],
                champion: null
            }
        };

        for (const [key, info] of Object.entries(INITIAL_GROUPS)) {
            tournamentState.groups[key] = {
                id: key,
                name: info.name,
                teams: info.teams.map((t, idx) => ({ name: t, rating: info.ratings[idx], pld: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, pts: 0 })),
                fixtures: []
            };
            
            const t = tournamentState.groups[key].teams;
            const pairings = [[0,1], [2,3], [0,2], [1,3], [3,0], [1,2]];
            pairings.forEach(p => {
                tournamentState.groups[key].fixtures.push({ home: t[p[0]].name, away: t[p[1]].name, homeScore: '', awayScore: '' });
            });
        }
        
        const drop = document.getElementById('sidebar-team-filter');
        if (drop) {
            drop.innerHTML = '<option value="ALL">Show All Players</option>';
            Object.values(INITIAL_GROUPS).forEach(g => {
                g.teams.forEach(t => {
                    drop.innerHTML += `<option value="${t}">${t}</option>`;
                });
            });
        }

        renderGroupStage();
        renderBracket();
        setupInputNavigation();
        changeFormation();
    }

    function changeFormation() {
        const formation = document.getElementById('formation-select').value;
        const pitch = document.getElementById('pitch-field');
        pitch.innerHTML = '';

        let structure = {
            "433": [ {pos: "FW", count: 3}, {pos: "MF", count: 3}, {pos: "DF", count: 4}, {pos: "GK", count: 1} ],
            "442": [ {pos: "FW", count: 2}, {pos: "MF", count: 4}, {pos: "DF", count: 4}, {pos: "GK", count: 1} ],
            "352": [ {pos: "FW", count: 2}, {pos: "MF", count: 5}, {pos: "DF", count: 3}, {pos: "GK", count: 1} ]
        }[formation];

        let absoluteSlotId = 0;
        structure.forEach(row => {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'pitch-line-row';
            
            for(let i=0; i < row.count; i++) {
                const currentId = absoluteSlotId;
                const playerVal = selectedDreamXI[currentId];
                
                let backgroundStyle = "var(--primary)";
                let initialText = row.pos;
                if (playerVal) {
                    backgroundStyle = playerVal.bg || "var(--primary)";
                    initialText = playerVal.init || "XI";
                }

                rowDiv.innerHTML += `
                    <div class="pitch-player-card" onclick="selectPitchSlot(${currentId}, '${row.pos}')">
                        <div class="avatar-circle-icon" style="background-color: ${backgroundStyle};">${initialText}</div>
                        <div class="player-name-label" id="slot-name-${currentId}">${playerVal ? playerVal.name : `Empty ${row.pos}`}</div>
                    </div>
                `;
                absoluteSlotId++;
            }
            pitch.appendChild(rowDiv);
        });
    }

    function selectPitchSlot(slotId, positionType) {
        activeSlotIndex = slotId;
        activePositionType = positionType;
        document.getElementById('sidebar-instruction').innerText = `Pick a ${positionType}`;
        loadPlayerPool();
    }

    function loadPlayerPool() {
        if(activeSlotIndex === null) return;
        const filterNation = document.getElementById('sidebar-team-filter').value;
        const container = document.getElementById('player-pool-container');
        container.innerHTML = '';

        let completeRosterList = [];

        if (filterNation === "ALL") {
            Object.values(INITIAL_GROUPS).forEach(g => {
                g.teams.forEach(t => {
                    completeRosterList = completeRosterList.concat(getProceduralSquadForNation(t));
                });
            });
        } else {
            completeRosterList = getProceduralSquadForNation(filterNation);
        }

        let pool = completeRosterList.filter(p => p.pos === activePositionType);

        if(pool.length === 0) {
            container.innerHTML = `<div style="font-size:0.85rem; color:var(--text-muted); padding:10px;">No matching roster options discovered.</div>`;
            return;
        }

        pool.forEach(player => {
            const div = document.createElement('div');
            div.className = 'pool-player-item';
            div.innerHTML = `
                <div class="pool-player-avatar-view" style="background-color: ${player.bg || 'var(--primary)'};">
                    ${player.init || 'P'}
                </div>
                <div class="pool-player-details">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span class="pool-player-name">${player.name}</span>
                        <span class="club-tag">${player.club}</span>
                    </div>
                    <div style="font-size:0.8rem; color:var(--primary); font-weight:600; margin-top:2px;">${player.team}</div>
                    <div class="pool-info-row">
                        <span>Role: <strong>${player.pref}</strong></span>
                        <span>H: ${player.height}</span>
                        <span>W: ${player.weight}</span>
                    </div>
                </div>
            `;
            div.onclick = () => {
                selectedDreamXI[activeSlotIndex] = player;
                changeFormation();
            };
            container.appendChild(div);
        });
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.view-panel').forEach(el => el.classList.remove('active'));
        document.getElementById(`tab-${tab}`).classList.add('active');
        document.getElementById(`panel-${tab}`).classList.add('active');
    }

    function setupInputNavigation() {
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.target.classList.contains('score-input')) {
                e.preventDefault();
                const inputs = Array.from(document.querySelectorAll('.score-input'));
                const currentIndex = inputs.indexOf(e.target);
                if (currentIndex > -1 && currentIndex < inputs.length - 1) {
                    inputs[currentIndex + 1].focus();
                    inputs[currentIndex + 1].select();
                }
            }
        });
    }

                    <td>${t.gd}</td>
                    <td><strong>${t.pts}</strong></td>
                </tr>
            `).join('');

            let fixtureRows = group.fixtures.map((f, idx) => `
                <div class="match-row">
                    <span class="match-team home">${f.home}</span>
                    <div class="score-inputs">
                        <input type="text" class="score-input" value="${f.homeScore}" oninput="updateManualScore('${key}', ${idx}, 'homeScore', this.value)">
                        <span>-</span>
                        <input type="text" class="score-input" value="${f.awayScore}" oninput="updateManualScore('${key}', ${idx}, 'awayScore', this.value)">
                    </div>
                    <span class="match-team away">${f.away}</span>
                </div>
            `).join('');

            card.innerHTML = `
                <h3>${group.name}</h3>
                <table class="standings-table">
                    <thead>
                        <tr>
                            <th style="text-align:left;">Team</th>
                            <th>P</th>
                            <th>GD</th>
                            <th>Pts</th>
                        </tr>
                    </thead>
                    <tbody>${tableRows}</tbody>
                </table>
                <div class="fixtures-list">${fixtureRows}</div>
            `;
            container.appendChild(card);
        }
    }

    function updateManualScore(groupKey, fixtureIdx, side, value) {
        const fixture = tournamentState.groups[groupKey].fixtures[fixtureIdx];
        fixture[side] = value === '' ? '' : parseInt(value);
        calculateStandings(groupKey);
        evaluateTournamentProgression();
        
        const groupCard = document.querySelector(`[data-group-id="${groupKey}"]`);
        if(groupCard) {
            const tableBody = groupCard.querySelector('.standings-table tbody');
            tableBody.innerHTML = tournamentState.groups[groupKey].teams.map((t) => `
                <tr>
                    <td class="team-name">${t.name}</td>
                    <td>${t.pld}</td>
                    <td>${t.gd}</td>
                    <td><strong>${t.pts}</strong></td>
                </tr>
            `).join('');
        }
        renderBracket();
    }

    function calculateStandings(groupId) {
        const group = tournamentState.groups[groupId];
        group.teams.forEach(t => { t.pld = 0; t.w = 0; t.d = 0; t.l = 0; t.gf = 0; t.ga = 0; t.gd = 0; t.pts = 0; });

        group.fixtures.forEach(f => {
            if (f.homeScore !== '' && f.awayScore !== '') {
                const hScore = parseInt(f.homeScore);
                const aScore = parseInt(f.awayScore);
                const homeTeam = group.teams.find(t => t.name === f.home);
                const awayTeam = group.teams.find(t => t.name === f.away);

                homeTeam.pld++; awayTeam.pld++;
                homeTeam.gf += hScore; awayTeam.gf += aScore;
                homeTeam.ga += aScore; awayTeam.ga += hScore;

                if (hScore > aScore) { homeTeam.w++; homeTeam.pts += 3; awayTeam.l++; }
                else if (hScore < aScore) { awayTeam.w++; awayTeam.pts += 3; homeTeam.l++; }
                else { homeTeam.d++; awayTeam.d++; homeTeam.pts += 1; awayTeam.pts += 1; }
            }
        });

        group.teams.forEach(t => { t.gd = t.gf - t.ga; });
        group.teams.sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
    }

    function simulateGroupStage() {
        for (const [key, group] of Object.entries(tournamentState.groups)) {
            group.fixtures.forEach(f => {
                const homeRating = group.teams.find(t => t.name === f.home).rating;
                const awayRating = group.teams.find(t => t.name === f.away).rating;
                
                const lambdaHome = Math.max(0.5, 1.4 + (homeRating - awayRating) / 10);
                const lambdaAway = Math.max(0.5, 1.4 + (awayRating - homeRating) / 10);

                f.homeScore = poissonRandom(lambdaHome);
                f.awayScore = poissonRandom(lambdaAway);
            });
            calculateStandings(key);
        }
        evaluateTournamentProgression();
        renderGroupStage();
        renderBracket();
    }

    function poissonRandom(lambda) {
        let L = Math.exp(-lambda), k = 0, p = 1;
        do { k++; p *= Math.random(); } while (p > L);
        return k - 1;
    }

    function evaluateTournamentProgression() {
        let qualifiers = []; 
        let thirdPlacePool = [];

        for (const [key, group] of Object.entries(tournamentState.groups)) {
            qualifiers.push({ seed: `1${key}`, name: group.teams[0].pld > 0 ? group.teams[0].name : `🏳️ 1${key}` });
            qualifiers.push({ seed: `2${key}`, name: group.teams[1].pld > 0 ? group.teams[1].name : `🏳️ 2${key}` });
            thirdPlacePool.push({ group: key, ...group.teams[2] });
        }

        thirdPlacePool.sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
        let activeWildcards = thirdPlacePool.slice(0, 8).map(t => t.pld > 0 ? t.name : "🏳️ TBD");

        const r32PairingTemplate = [
            { t1: "1A", t2: "3EFGH" }, { t1: "1B", t2: "3IJKL" }, { t1: "1C", t2: "2F" }, { t1: "2A", t2: "2B" },
            { t1: "1D", t2: "3BEFI" }, { t1: "1E", t2: "3ABCD" }, { t1: "1F", t2: "2C" }, { t1: "2D", t2: "2G" },
            { t1: "1G", t2: "3ABCJ" }, { t1: "1H", t2: "3EFGK" }, { t1: "1I", t2: "2E" }, { t1: "2I" , t2: "2H" },
            { t1: "1J", t2: "3FGHI" }, { t1: "1K", t2: "3IJKL" }, { t1: "1L", t2: "2L" }, { t1: "2J", t2: "2K" }
        ];

        let wildcardIdx = 0;
        r32PairingTemplate.forEach((match, idx) => {
            let homeTeam = qualifiers.find(q => q.seed === match.t1)?.name || "🏳️ TBD";
            let awayTeam = "🏳️ TBD";

            if (match.t2.startsWith("2")) {
                awayTeam = qualifiers.find(q => q.seed === match.t2)?.name || "🏳️ TBD";
            } else {
                awayTeam = activeWildcards[wildcardIdx] || "🏳️ TBD";
                wildcardIdx++;
            }

            if(tournamentState.knockouts.r32[idx][0].name !== homeTeam) tournamentState.knockouts.r32[idx][0].name = homeTeam;
            if(tournamentState.knockouts.r32[idx][1].name !== awayTeam) tournamentState.knockouts.r32[idx][1].name = awayTeam;
        });

        propagateNextRound('r32', 'r16');
        propagateNextRound('r16', 'qf');
        propagateNextRound('qf', 'sf');
        propagateFinalsAndThirdPlace();
    }

    function propagateNextRound(currentRoundKey, nextRoundKey) {
        const matches = tournamentState.knockouts[currentRoundKey];
        const nextMatches = tournamentState.knockouts[nextRoundKey];

        for (let i = 0; i < matches.length; i += 2) {
            const match1 = matches[i];
            const match2 = matches[i+1];
            const nextMatchIdx = i / 2;

            const winner1 = getMatchWinner(match1);
            const winner2 = getMatchWinner(match2);

            if(nextMatches[nextMatchIdx][0].name !== winner1) {
                nextMatches[nextMatchIdx][0].name = winner1;
                nextMatches[nextMatchIdx][0].score = "";
                nextMatches[nextMatchIdx][0].pkScore = "";
            }
            if(nextMatches[nextMatchIdx][1].name !== winner2) {
                nextMatches[nextMatchIdx][1].name = winner2;
                nextMatches[nextMatchIdx][1].score = "";
                nextMatches[nextMatchIdx][1].pkScore = "";
            }
        }
    }

    function propagateFinalsAndThirdPlace() {
        const sfMatches = tournamentState.knockouts.sf;
        const finalMatch = tournamentState.knockouts.final[0];
        const thirdPlaceMatch = tournamentState.knockouts.thirdPlace[0];

        const winner1 = getMatchWinner(sfMatches[0]);
        const winner2 = getMatchWinner(sfMatches[1]);
        const loser1 = getMatchLoser(sfMatches[0]);
        const loser2 = getMatchLoser(sfMatches[1]);

        if(finalMatch[0].name !== winner1) { finalMatch[0].name = winner1; finalMatch[0].score = ""; finalMatch[0].pkScore = ""; }
        if(finalMatch[1].name !== winner2) { finalMatch[1].name = winner2; finalMatch[1].score = ""; finalMatch[1].pkScore = ""; }

        if(thirdPlaceMatch[0].name !== loser1) { thirdPlaceMatch[0].name = loser1; thirdPlaceMatch[0].score = ""; thirdPlaceMatch[0].pkScore = ""; }
        if(thirdPlaceMatch[1].name !== loser2) { thirdPlaceMatch[1].name = loser2; thirdPlaceMatch[1].score = ""; thirdPlaceMatch[1].pkScore = ""; }

        const champion = getMatchWinner(finalMatch);
        if (champion && champion !== "🏳️ TBD" && champion !== tournamentState.knockouts.champion) {
            tournamentState.knockouts.champion = champion;
            document.getElementById('award-team').value = champion;
            triggerCelebration();
        } else if (!champion || champion === "🏳️ TBD") {
            tournamentState.knockouts.champion = null;
        }
    }

    function getMatchWinner(match) {
        if (match[0].score === "" || match[1].score === "" || match[0].score === null || match[1].score === null) return "🏳️ TBD";
        const s1 = parseInt(match[0].score);
        const s2 = parseInt(match[1].score);
        
        if (s1 === s2) {
            const pk1 = parseInt(match[0].pkScore);
            const pk2 = parseInt(match[1].pkScore);
            if (isNaN(pk1) || isNaN(pk2)) return "🏳️ TBD";
            return pk1 > pk2 ? match[0].name : match[1].name;
        }
        return s1 > s2 ? match[0].name : match[1].name;
    }

    function getMatchLoser(match) {
        if (match[0].score === "" || match[1].score === "" || match[0].score === null || match[1].score === null) return "🏳️ TBD";
        const s1 = parseInt(match[0].score);
        const s2 = parseInt(match[1].score);
        
        if (s1 === s2) {
            const winner = getMatchWinner(match);
            if (winner === "🏳️ TBD") return "🏳️ TBD";
            return winner === match[0].name ? match[1].name : match[0].name;
        }
        return s1 > s2 ? match[1].name : match[0].name;
    }

    function updateKnockoutScore(roundKey, matchIdx, teamIdx, val) {
        let match = tournamentState.knockouts[roundKey] ? tournamentState.knockouts[roundKey][matchIdx] : tournamentState.knockouts.thirdPlace[matchIdx];
        match[teamIdx].score = val === "" ? "" : parseInt(val);
        
        runPropagationChain(roundKey);
        renderBracket();
    }

    function updatePenaltyScore(roundKey, matchIdx, teamIdx, val) {
        let match = tournamentState.knockouts[roundKey] ? tournamentState.knockouts[roundKey][matchIdx] : tournamentState.knockouts.thirdPlace[matchIdx];
        match[teamIdx].pkScore = val === "" ? "" : parseInt(val);
        
        runPropagationChain(roundKey);
        renderBracket();
    }

    function runPropagationChain(roundKey) {
        if (roundKey === 'r32') { propagateNextRound('r32', 'r16'); propagateNextRound('r16', 'qf'); propagateNextRound('qf', 'sf'); propagateFinalsAndThirdPlace(); }
        else if (roundKey === 'r16') { propagateNextRound('r16', 'qf'); propagateNextRound('qf', 'sf'); propagateFinalsAndThirdPlace(); }
        else if (roundKey === 'qf') { propagateNextRound('qf', 'sf'); propagateFinalsAndThirdPlace(); }
        else if (roundKey === 'sf' || roundKey === 'final' || roundKey === 'thirdPlace') { propagateFinalsAndThirdPlace(); }
    }

                                <input type="text" class="score-input" value="${match[0].score !== null ? match[0].score : ''}" oninput="updateKnockoutScore('${round.id}', ${idx}, 0, this.value)">

                const thirdCard = document.createElement('div');

    function triggerCelebration() {
        if (celebrationActive) return;
        celebrationActive = true;
        const canvas = document.getElementById('celeb-canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        particles = [];
        for (let i = 0; i < 150; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                r: Math.random() * 6 + 4,
                d: Math.random() * canvas.height,
                color: `hsl(${Math.random() * 360}, 90%, 60%)`,
                tilt: Math.random() * 10 - 5,
                tiltAngleIncremental: Math.random() * 0.07 + 0.02,
                tiltAngle: 0
            });
        }

        let animationFrameId;
        let startTime = Date.now();

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let remaining = false;

            particles.forEach((p) => {
                p.tiltAngle += p.tiltAngleIncremental;
                p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2;
                p.x += Math.sin(p.tiltAngle);
                p.tilt = Math.sin(p.tiltAngle - p.r / 2) * 5;

                if (p.y < canvas.height) remaining = true;

                ctx.beginPath();
                ctx.lineWidth = p.r;
                ctx.strokeStyle = p.color;
                ctx.moveTo(p.x + p.tilt + p.r / 2, p.y);
                ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
                ctx.stroke();
            });

            if (remaining && Date.now() - startTime < 6000) {
                animationFrameId = requestAnimationFrame(draw);
            } else {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                celebrationActive = false;
            }
        }
        draw();
    }
